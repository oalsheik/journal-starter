apiVersion: v1
kind: ConfigMap
metadata:
  name: journal-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"   # Grafana sidecar auto-loads ConfigMaps with this label
data:
  journal-api.json: |
    {
      "title": "Journal API",
      "uid": "journal-api",
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"journal-api-service\"}[1m])) by (method, handler)",
              "legendFormat": "{{method}} {{handler}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate (%)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"journal-api-service\", status=~\"5..\"}[1m])) / sum(rate(http_requests_total{job=\"journal-api-service\"}[1m])) * 100",
              "legendFormat": "5xx error rate %"
            }
          ]
        },
        {
          "id": 3,
          "title": "Request Latency P50 / P95 / P99 (s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"journal-api-service\"}[1m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"journal-api-service\"}[1m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"journal-api-service\"}[1m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 4,
          "title": "Ready Pods",
          "type": "stat",
          "gridPos": { "x": 12, "y": 8, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_ready{deployment=\"journal-api\"}",
              "legendFormat": "Ready"
            }
          ]
        },
        {
          "id": 5,
          "title": "Desired Pods",
          "type": "stat",
          "gridPos": { "x": 18, "y": 8, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "kube_deployment_spec_replicas{deployment=\"journal-api\"}",
              "legendFormat": "Desired"
            }
          ]
        },
        {
          "id": 6,
          "title": "Pod Restarts",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"default\", pod=~\"journal-api.*\"}[5m])",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 7,
          "title": "CPU Usage (cores)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"default\", pod=~\"journal-api.*\", container=\"journal-api\"}[1m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 8,
          "title": "Memory Usage (MB)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"default\", pod=~\"journal-api.*\", container=\"journal-api\"}) by (pod) / 1024 / 1024",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ]
    }
