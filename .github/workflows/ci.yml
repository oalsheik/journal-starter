name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: career_journal
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/career_journal
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
    steps:
      - name: pull code
        uses: actions/checkout@v4
      - name: Install uv and python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync
      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -U postgres && break
            sleep 3
          done
      - name: Run migrations (if any)
        run: |
          if [ -f database_setup.sql ]; then
            psql "$DATABASE_URL" -f database_setup.sql
          fi
      - name: Run tests
        run: uv run pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: pull code
        uses: actions/checkout@v4
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: l2capi.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -t l2capi.azurecr.io/journal-api:${{ github.sha }} \
            -t l2capi.azurecr.io/journal-api:latest \
            .

      - name: Push Docker image
        run: |
          docker push l2capi.azurecr.io/journal-api:${{ github.sha }}
          docker push l2capi.azurecr.io/journal-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: pull code
        uses: actions/checkout@v4

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create ACR image pull secret
        run: |
          kubectl create secret docker-registry acr-secret \
            --docker-server=l2capi.azurecr.io \
            --docker-username="${{ secrets.ACR_USERNAME }}" \
            --docker-password="${{ secrets.ACR_PASSWORD }}" \
            --save-config --dry-run=client -o yaml | kubectl apply -f -

      - name: Create k8s secret
        run: |
          kubectl create secret generic journal-api-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=OPENAI_BASE_URL="${{ secrets.OPENAI_BASE_URL }}" \
            --from-literal=OPENAI_MODEL="${{ secrets.OPENAI_MODEL }}" \
            --save-config --dry-run=client -o yaml | kubectl apply -f -

      - name: Substitute image placeholder
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|l2capi.azurecr.io/journal-api:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/
